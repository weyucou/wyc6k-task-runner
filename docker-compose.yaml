name: wade

services:

  localstack:
    image: localstack/localstack:4.12.0
    container_name: "marvin-localstack-4.12.0"
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs

  wait:
    image: waisbrot/wait
    depends_on:
      - localstack
    environment:
      - TARGETS=localstack:4566
